name: Release Tempo

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build Apple Silicon app
        run: zsh apps/apple/Scripts/package-macos.sh "$GITHUB_WORKSPACE/Tempo.zip"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" Tempo.zip
          --verify-tag
          --title "Tempo $GITHUB_REF_NAME"
          --generate-notes
